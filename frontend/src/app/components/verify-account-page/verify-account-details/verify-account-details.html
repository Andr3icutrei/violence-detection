<div class="verify-account-description-container">
  <div class="verify-account-description-title-container">
    <h2 class="verify-account-description-title">
      {{ status + '-title' | translate }}
    </h2>
  </div>

  <div class="verify-account-description-icon-container">
    <i
      [class]="'verify-account-description-icon' + ' ' + icon + ' ' + getSuccessfulMessage()">
    </i>
  </div>

  <div class="verify-account-description-details-container">
    @if(status === 'success') {
      <span class="detail-message">
      <i class="fa-solid fa-check-circle success-message"></i>
        {{ status + '-description'  | translate }}
    </span>
    } @else {
      <span class="error-message">
      <i class="fa-solid fa-circle-exclamation error-message"></i>
        {{ status + '-description'  | translate }}
    </span>
    }
  </div>

  @if(showReturnToLogin) {
    <div class="verify-account-description-redirect">
      <button
        type="button"
        class="btn-primary btn-redirect"
        (click)="returnToLoginClick()">
        {{ 'verify-account.redirect-to-login' | translate }}
      </button>
    </div>
  }
</div>
