<div class="dashboard-container">
  <div class="dashboard-topbar-container">
    <div class="dashboard-searchbar-container">
      <app-search-bar
        (onDebouncedSearch)="debouncedSearch($event)"
        [placeholderText]="'dashboard.search-bar-placeholder' | translate"
      ></app-search-bar>
    </div>
    <div class="create-dataset-button-container">
      <button
        class="btn-primary create-dataset-button"
        (click)="openCreateDatasetModal()">
        <i class="fa-solid fa-plus plus-icon"></i>
        {{ 'dashboard.create-dataset' | translate }}
      </button>
    </div>
  </div>

  <div class="dashboard-inspect-videos-container">
    <div *ngIf="!isLoadingVideos && videos.length === 0" class="empty-state">
      {{ 'dashboard.no-videos-found' | translate }}
    </div>

    <div *ngIf="videos.length > 0" class="videos-grid" #videosGrid>
      <app-video-thumbnail-card
        *ngFor="let video of videos"
        [video]="video">
      </app-video-thumbnail-card>
    </div>

    <app-paginator
      *ngIf="videos.length > 0"
      [page]="page"
      [pageSize]="pageSize"
      [hasMore]="hasMoreVideos"
      (pageChange)="onPageChange($event)">
    </app-paginator>
  </div>
</div>

@if(isCreateDatasetPopupOpen) {
  <app-create-dataset
    (closeModal)="closeCreateDatasetModal()">
  </app-create-dataset>
}
