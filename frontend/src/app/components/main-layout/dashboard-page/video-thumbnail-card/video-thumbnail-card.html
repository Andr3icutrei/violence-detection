<div class="video-card" (click)="goToInferencePage()">
  <div class="video-preview-container"
       (mouseenter)="playPreview(videoPreview)"
       (mouseleave)="stopPreview(videoPreview)">
    <video
      #videoPreview
      class="video-preview"
      [src]="video.path"
      poster=""
      preload="metadata"
      [muted]="true"
      (volumechange)="$any($event.target).muted = true; $any($event.target).volume = 0;"
      loop>
    </video>
    <div class="duration-badge">{{ formatDuration(video.duration) }}</div>
    <div class="violence-badge" [class.is-violent]="video.is_violent">
      {{ (video.is_violent ? 'dashboard.violent' : 'dashboard.non-violent') | translate }}
    </div>
  </div>

  <div class="video-info">
    <h3 class="video-name" [title]="video.name">{{ video.name }}</h3>
    <div class="dataset-info">
      <span class="dataset-label">Dataset:</span>
      <span class="dataset-name">{{ video.dataset.name }}</span>
    </div>
  </div>
</div>
