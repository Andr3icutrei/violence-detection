<div class="stats-content-subsection-container">
  <div class="stats-subsection-header-container">
    <h3> {{ 'stats.per-action-credits' | translate }} </h3>
  </div>

  <div class="stats-section-container">
    <div class="stats-form-container">
      @if (creditsCronjobUpdateOriginal) {
        <form [formGroup]="form" (ngSubmit)="modifyUpdateCredits()">
          <div class="stats-form">
            <div class="detail-item">
              <div class="inference-action-row-container">
                <div class="inference-action-row-label-container">
                  <span class="detail-item-label">{{ 'stats.update-credits' | translate }} ({{ creditsCronjobUpdateOriginal }} credits)</span>
                </div>

                <div class="inference-action-row-input-container">
                  <input
                    type="number"
                    min="0"
                    class="input-text-primary inference-action-credits-input"
                    formControlName="credits"/>
                </div>
              </div>
            </div>
          </div> <div class="submit-btn-container">
          <button
            type="submit"
            class="btn-primary submit-btn"
            [disabled]="form.invalid">
            {{ 'stats.save' | translate }}
          </button>
        </div>
        </form>
      }
    </div>
  </div>
</div>
