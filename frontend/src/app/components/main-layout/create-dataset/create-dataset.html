<div class="create-dataset-overlay" (click)="close()">
  <div class="create-dataset-content" (click)="onContentClick($event)">
    <div class="create-dataset-title-container">
      <h2 class="create-dataset-title">
        {{ 'create-dataset.title' | translate }}
      </h2>
      <button class="close-modal-btn"
        type="button"
        (click)="close()">
        <i class="fa fa-times close-modal-icon" aria-hidden="true"></i>
      </button>
    </div>

    <div class="create-dataset-form-container">
      <form [formGroup]="form" (ngSubmit)="submitDataset()">
        <div class="input-fields-container fields-container">
          <div class="input-group">
            <label
              for="name"
              class="label-primary"
              [class.required-asterisk]="isControlRequired('name')">
              {{'create-dataset.dataset-name' | translate}}
            </label>
            <input
              id="name"
              name="name"
              class="input-text-primary dataset-name"
              type="text"
              [placeholder]="'create-dataset.dataset-name-placeholder' | translate"
              formControlName="name"/>
            <app-control-error [control]="form.get('name')!"></app-control-error>
          </div>

          <div class="input-group">
            <label
              for="inferenceModelName"
              class="label-primary"
              [class.required-asterisk]="isControlRequired('inferenceModelName')">
              {{'create-dataset.inference-model-name' | translate}}
            </label>
            <input
              id="inferenceModelName"
              name="inferenceModelName"
              class="input-text-primary"
              type="text"
              [placeholder]="'create-dataset.inference-model-name-placeholder' | translate"
              formControlName="inferenceModelName"/>
            <app-control-error [control]="form.get('inferenceModelName')!"></app-control-error>
          </div>

          <div class="input-group">
            <label
              for="upload-model"
              class="label-primary">
              {{'create-dataset.upload-model' | translate}}
            </label>
            <input
              id="upload-model"
              class="videos-input"
              type="file"
              accept=".onnx"
              (change)="onModelFileSelected($event)"
            >
            @if (selectedInferenceModel) {
              <span class="detail-item-value">{{ selectedInferenceModel.name }}</span>
            }
          </div>

          <div class="videos-to-input-container">
            <label
              for="upload-videos"
              class="label-primary required-asterisk label-upload-videos">
              {{'create-dataset.upload-videos' | translate}}
            </label>

            <div class="videos-input-container">
              <input
                class="videos-input"
                type="file"
                accept="video/mp4"
                (change)="onFileSelected($event)"
                multiple
              >
            </div>

            <div class="create-dataset-submit-container">
              <button
                class="btn-primary create-dataset-submit-btn"
                type="submit"
                [disabled]="!isFormValid()">
                {{ 'create-dataset.create-dataset-submit' | translate }}
              </button>
            </div>
          </div>
          @if(getSubmitMessageKey()) {
            <div class="submit-errors-container errors-container">
              <app-form-submit-detail
                [message]="getSubmitMessageKey()!"
                [success]="success !== null && success"
                [translateParams]="getSubmitTranslateParams()">
              </app-form-submit-detail>
            </div>
          }
        </div>
      </form>
    </div>
  </div>
</div>
