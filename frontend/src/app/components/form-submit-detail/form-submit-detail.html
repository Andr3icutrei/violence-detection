<div class="form-detail-container"
  [class.form-detail-success-container]="success"
  [class.form-detail-error-container]="!success">
  @if(success) {
    <span class="detail-message">
      <i class="fa-solid fa-check-circle success-message"></i>
      {{ message | translate: translateParams }}
    </span>
  } @else {
    <span class="error-message">
      <i class="fa-solid fa-circle-exclamation error-message"></i>
      {{ message | translate: translateParams }}
    </span>
  }
</div>
