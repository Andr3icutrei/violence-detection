<div class="sidebar-container">
  @for(menuItem of visibleMenuItemsForUser; track menuItem.id) {
    <div
      class="sidebar-item"
      [class.sidebar-item-selected]="menuItem.id === selectedSidebarItem"
      (click)="goToPage(menuItem.id)"
    >
      <i class="sidebar-item-icon" [class]="menuItem.icon"></i>
      <span class="sidebar-item-title">{{ menuItem.title | translate }}</span>
    </div>
  }
</div>
